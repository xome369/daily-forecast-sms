name: Daily Forecast

on:
  schedule:
    - cron: "0 12 * * *"  # Runs daily at 12:00 UTC (7:00 AM EST)
  workflow_dispatch:        # Allows manual trigger from GitHub Actions UI

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily forecast
        env:
          OPEN_WEATHER_MAP_API_KEY: ${{ secrets.OPEN_WEATHER_MAP_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_MESSAGING_SERVICE_SID: ${{ secrets.TWILIO_MESSAGING_SERVICE_SID }}
          RECIPIENT_NUMBER: ${{ secrets.RECIPIENT_NUMBER }}
          CITY: ${{ secrets.CITY }}
        run: python main.py
